# Mosquitto config for the DriveMetrics MQTT bridge (local LAN demo).
#   mosquitto -c tools/mosquitto.conf -v
#
# Listens on all interfaces so the STM32 can reach it at the PC's LAN IP
# (set that IP as MQTT_BROKER_IP in Core/Inc/net_config.h). Anonymous access
# is fine on a trusted LAN; the board sends no credentials.
#
# Make sure the PC firewall allows inbound TCP 1883 on the local network.

listener 1883 0.0.0.0
allow_anonymous true
